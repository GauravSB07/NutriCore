{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#c4b5fd,#7c3aed);
}

/* MAIN CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    background: #f3f4f6;
    border-radius: 30px;
    padding: 16px;
    min-height: 100vh;
}

/* HERO */
.hero {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.hero small {
    color: #7c3aed;
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 20px;
}

.hero h1 {
    font-size: 30px;
    font-weight: 800;
    margin: 4px 0 10px;
    color: #111827;
}

/* CARD */
.workout-card {
    margin-top: 16px;
    height: 110px;
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    padding: 16px;
    text-decoration: none;
    color: white;
    transition: 0.25s ease;
}

/* HOVER */
.workout-card:hover {
    transform: translateY(-3px) scale(1.01);
}

/* IMAGE */
.card-img {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 65%;
    object-fit: cover;
}

/* GRADIENT OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to right,
        rgba(109,40,217,0.95) 0%,
        rgba(167,139,250,0.8) 40%,
        rgba(255,255,255,0) 100%
    );
}

/* TEXT */
.card-content {
    position: relative;
    z-index: 2;
}

.card-content h3 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
}
</style>

<div class="container">

    <!-- HERO -->
    <div class="hero">

        <div>
            <small>START YOUR</small>
            <h1>WORKOUT</h1>
        </div>

        <img src="{% static 'images/startworkout.png' %}" 
             alt="Workout"
             style="width:80px;height:80px;object-fit:contain;">
    </div>
    

    <!-- CARDS -->
    {% for m in muscles %}
    <a href="{% url 'choose_sub' m.id %}" class="workout-card">

        <!-- IMAGE -->
        <img src="{% if m.image %}{{ m.image.url }}{% else %}{% static 'images/default.jpg' %}{% endif %}" 
             class="card-img">

        <!-- OVERLAY -->
        <div class="overlay"></div>

        <!-- TEXT -->
        <div class="card-content">
            <h3>{{ m.name|upper }}</h3>
        </div>

    </a>
    {% endfor %}

</div>

{% endblock %}
