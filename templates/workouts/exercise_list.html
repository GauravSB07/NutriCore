{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#e9d5ff,#c084fc);
}

/* WRAPPER */
.wrapper {
    display: flex;
    justify-content: center;
    padding: 12px;
}

.screen {
    width: 100%;
    max-width: 420px;
    background: #f5f3ff;
    border-radius: 30px;
    padding: 16px;
}

/* HEADER */
.header {
    text-align: center;
    font-size: 18px;
    color: #6b7280;
}

/* TITLE */
.title {
    margin-top: 10px;
    font-size: 22px;
    font-weight: 700;
}

/* CARD */
.exercise-card {
    margin-top: 16px;
    border-radius: 22px;
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    color: white;
    text-decoration: none;
    overflow: hidden;
    transition: 0.25s ease;
}

/* HOVER */
.exercise-card:hover {
    transform: translateY(-2px) scale(1.01);
}

/* GRADIENT BACKGROUND */
.exercise-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to right,
        rgba(124,58,237,0.95),
        rgba(167,139,250,0.7)
    );
    z-index: 1;
}

/* IMAGE */
.exercise-img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    overflow: hidden;
    background: white;
    flex-shrink: 0;
    z-index: 2;
}

.exercise-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* 🔥 full image visible */

    opacity: 0.75;         /* 🔥 keep dark feel */
    filter: brightness(0.85) contrast(1.1);

    transition: 0.3s ease;
}

/* TEXT */
.card-content {
    position: relative;
    z-index: 2;
}

.card-content .name {
    font-size: 16px;
    font-weight: 700;
}

/* SMALL TAG */
.tag {
    font-size: 11px;
    margin-top: 4px;
    background: rgba(255,255,255,0.2);
    padding: 4px 8px;
    border-radius: 10px;
    display: inline-block;
}
</style>

<div class="wrapper">
<div class="screen">

    <!-- HEADER -->
    <div class="header">EXERCISES</div>

    <!-- TITLE -->
    <div class="title">{{ sub_muscle.name }}</div>

    <!-- EXERCISE CARDS -->
    {% for e in exercises %}
    <a href="{% url 'exercise_detail' e.id %}" class="exercise-card">

        <!-- ROUND IMAGE -->
        <div class="exercise-img">
            <img src="{% if e.image %}{{ e.image.url }}{% else %}{% static 'images/default.png' %}{% endif %}">
        </div>

        <!-- TEXT -->
        <div class="card-content">
            <div class="name">{{ e.name|upper }}</div>
        </div>

    </a>
    {% endfor %}

</div>
</div>

{% endblock %}
