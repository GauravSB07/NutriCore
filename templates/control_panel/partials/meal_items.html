{% for m in meals %}

<div class="meal-item">

    <div class="meal-top">
        <div>
            <div class="food-name">{{ m.food.name }}</div>
            <div class="user">@{{ m.user.username }}</div>
        </div>

        <div class="badge">
            {{ m.quantity }} {{ m.unit }}
        </div>
    </div>

    <div class="info">
        🔥 {{ m.calories|floatformat:0 }} kcal |
        💪 {{ m.protein|floatformat:0 }}g
    </div>

    <div class="info">
        📅 {{ m.date|date:"M d, Y" }}
    </div>

    <div class="actions">
        <a href="{% url 'edit_meal_log' m.id %}" class="edit">Edit</a>
        <a href="{% url 'delete_meal_log' m.id %}" class="delete"
           onclick="return confirm('Delete this meal?')">
           Delete
        </a>
    </div>

</div>

{% empty %}
<p style="color:#6b7280;">No meal logs found</p>
{% endfor %}
