{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 REMOVE NAVBAR */
nav, .navbar, .bottom-nav, .top-nav, header {
    display: none !important;
}

body {
    margin: 0 !important;
    padding: 0 !important;
    background: linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family: 'Poppins', sans-serif;
}

/* WRAPPER */
.wrapper {
    max-width: 420px;
    margin: auto;
    padding: 16px;
}

/* HEADER */
.header {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
}

.sub-header {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 12px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

/* ADD BUTTON */
.add-btn {
    padding: 10px 14px;
    border-radius: 12px;
    background: linear-gradient(to right,#7c3aed,#a78bfa);
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
}

/* SEARCH BOX */
.search-box input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border-radius: 14px;
    border: 1px solid rgba(124,58,237,0.2);
    outline: none;
    font-size: 13px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
}

.search-box {
    position: relative;
    margin-bottom: 12px;
}

.search-icon {
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    font-size:14px;
    color:#7c3aed;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    padding: 14px;

    border: 1px solid rgba(124,58,237,0.15);
    box-shadow: 0 10px 25px rgba(124,58,237,0.12);
}

/* FOOD ITEM */
.food-item {
    padding: 12px;
    border-radius: 14px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(124,58,237,0.1);
    transition: 0.2s;
}

.food-item:hover {
    background: #ede9fe;
    transform: translateY(-2px);
}

/* FOOD TOP */
.food-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.food-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.food-img {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    object-fit: cover;
}

.name {
    font-weight: 600;
    font-size: 14px;
}

.info {
    font-size: 12px;
    color: #6b7280;
    margin-top: 4px;
}

.tags {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.tag {
    font-size: 11px;
    background: #f3f4f6;
    padding: 4px 8px;
    border-radius: 10px;
}

.actions {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 12px;
}

.edit { color: #7c3aed; }
.delete { color: #dc2626; }

/* BACK BUTTON */
.back-btn {
    display: inline-block;
    margin-bottom: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    text-decoration: none;

    transition: 0.2s;
}

.back-btn:hover {
    color: #7c3aed;
}

</style>


<div class="wrapper">

    <div class="header">Food Library 🍽 
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <a href="{% url 'admin_dashboard' %}" class="back-btn">
        ← Dashboard
    </a>
    </div>
    <div class="sub-header">Total Foods: {{ foods|length }}</div>


    <div class="top-bar">
        <a href="{% url 'add_food' %}" class="add-btn">+ Add Food</a>
    </div>

    <!-- 🔥 AJAX SEARCH -->
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search food...">
    </div>

    <!-- 🔥 LIST -->
    <div class="card" id="food-container">
        {% include 'control_panel/partials/food_list_items.html' %}
    </div>

</div>

<!-- 🔥 AJAX SCRIPT -->
<script>
const input = document.getElementById('searchInput');
const container = document.getElementById('food-container');

let timeout = null;

input.addEventListener('input', function () {
    clearTimeout(timeout);

    timeout = setTimeout(() => {
        container.style.opacity = "0.5";

        fetch(`?q=${this.value}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(data => {
            container.innerHTML = data.html;
            container.style.opacity = "1";
        });

    }, 300);
});
</script>

{% endblock %}
