{% extends 'base.html' %}
{% block content %}

<style>

/* REMOVE NAV */
nav, .navbar, .bottom-nav, .top-nav, header{
    display:none !important;
}

body{
    margin:0;
    background:linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family:'Poppins',sans-serif;
}

/* WRAPPER */
.wrapper{
    max-width:420px;
    margin:auto;
    padding:18px;
}

/* BACK */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;

    padding:6px 10px;
    margin-bottom:12px;

    border-radius:10px;

    background:rgba(255,255,255,0.6);
    border:1px solid rgba(124,58,237,0.2);

    font-size:12px;
    font-weight:600;
    color:#6b7280;
    text-decoration:none;

    transition:0.2s;
}

.back-btn:hover{
    background:#ede9fe;
    color:#7c3aed;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:800;
    margin-bottom:14px;
    color:#111827;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(18px);

    border-radius:24px;
    padding:18px;

    border:1px solid rgba(124,58,237,0.1);

    box-shadow:
        0 10px 25px rgba(124,58,237,0.12);
}

/* LABEL */
label{
    font-size:12px;
    font-weight:600;
    color:#4b5563;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:14px;

    border-radius:14px;
    border:1px solid rgba(124,58,237,0.18);

    background:rgba(255,255,255,0.8);

    font-size:13px;
    font-family:'Poppins',sans-serif;

    outline:none;
    box-sizing:border-box;

    transition:0.2s;
}

input:focus{
    border-color:#7c3aed;

    box-shadow:
        0 0 0 3px rgba(124,58,237,0.15);
}

/* SELECT WRAPPER */
.select-wrapper{
    position:relative;
    margin-bottom:14px;
}

/* CUSTOM SELECT */
select{
    width:100%;
    padding:12px 42px 12px 14px;

    border-radius:16px;
    border:1px solid rgba(124,58,237,0.18);

    background:
        linear-gradient(145deg,#ffffff,#f5f3ff);

    font-size:13px;
    font-family:'Poppins',sans-serif;
    color:#374151;

    outline:none;
    cursor:pointer;

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;

    box-sizing:border-box;

    transition:0.2s;
}

/* CUSTOM ARROW */
.select-wrapper::after{
    content:"⌄";

    position:absolute;
    right:14px;
    top:50%;

    transform:translateY(-20%);

    color:#7c3aed;
    font-size:18px;
    font-weight:bold;

    pointer-events:none;
}

/* FOCUS */
select:focus{
    border-color:#7c3aed;

    box-shadow:
        0 0 0 3px rgba(124,58,237,0.15);
}

/* BUTTON */
.btn{
    width:100%;
    padding:13px;

    border:none;
    border-radius:16px;

    background:linear-gradient(to right,#7c3aed,#a78bfa);

    color:white;
    font-size:14px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;

    box-shadow:
        0 8px 20px rgba(124,58,237,0.25);
}

.btn:hover{
    transform:translateY(-1px);
}

/* ERROR */
.error-box{
    background:#fee2e2;
    color:#dc2626;

    padding:10px;
    border-radius:12px;

    font-size:12px;
    margin-bottom:12px;
}

/* TOM SELECT */
.ts-wrapper.single .ts-control{
    border:none !important;
    background:linear-gradient(145deg,#ffffff,#f5f3ff) !important;

    padding:12px !important;

    border-radius:16px !important;

    box-shadow:none !important;

    border:1px solid rgba(124,58,237,0.18) !important;
}

.ts-dropdown{
    border:none !important;

    border-radius:16px !important;

    overflow:hidden;

    box-shadow:
        0 10px 25px rgba(124,58,237,0.15) !important;
}

.ts-dropdown .option{
    padding:12px !important;
    font-size:13px !important;
}

.ts-dropdown .active{
    background:#ede9fe !important;
    color:#7c3aed !important;
}

</style>

<!-- TOM SELECT -->
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        Add / Edit Sub Muscle 🧠
    </div>

    <!-- BACK -->
    <a href="{% url 'sub_muscle_list' %}" class="back-btn">
        ← Sub Muscles
    </a>

    <!-- CARD -->
    <div class="card">

        {% if form.errors %}
        <div class="error-box">
            {{ form.errors }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <!-- NAME -->
            <label>Sub Muscle Name</label>
            {{ form.name }}

            <!-- MUSCLE GROUP -->
            <label>Muscle Group</label>

            <div class="select-wrapper">
                {{ form.muscle_group }}
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn">
                Save Sub Muscle
            </button>

        </form>

    </div>

</div>

<!-- TOM SELECT -->
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script>

new TomSelect("#id_muscle_group",{

    create:false,

    sortField:{
        field:"text",
        direction:"asc"
    },

    placeholder:"Select muscle group",

    maxOptions:100

});

</script>

{% endblock %}
