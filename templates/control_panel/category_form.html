{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 REMOVE NAVBAR */
nav, .navbar, .bottom-nav, .top-nav, header {
    display: none !important;
}

body {
    margin: 0 !important;
    padding: 0 !important;
    background: linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family: 'Poppins', sans-serif;
}

/* WRAPPER */
.wrapper {
    max-width: 420px;
    margin: auto;
    padding: 18px;
}

/* HEADER */
.header {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 16px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);
    border-radius: 24px;
    padding: 18px;

    border: 1px solid rgba(124,58,237,0.15);
    box-shadow: 0 10px 25px rgba(124,58,237,0.12);
}

/* LABEL */
label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    margin-bottom: 14px;

    border-radius: 12px;
    border: 1px solid rgba(124,58,237,0.2);

    outline: none;
    font-size: 14px;
}

input:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 0 2px rgba(124,58,237,0.2);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;

    background: linear-gradient(to right,#7c3aed,#a78bfa);
    color: white;
    font-weight: 600;

    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.02);
}

/* BACK */
.back {
    display: block;
    margin-top: 14px;
    text-align: center;
    font-size: 13px;
    color: #6b7280;
    text-decoration: none;
}

</style>


<div class="wrapper">

    <div class="header">
        Add / Edit Category 📂
    </div>

    <div class="card">

        <form method="POST">
            {% csrf_token %}

            <!-- NAME -->
            <label>Category Name</label>
            {{ form.name }}

            <button type="submit" class="btn">
                Save Category
            </button>

        </form>

    </div>

    <a href="{% url 'category_list' %}" class="back">
        ← Back to Categories
    </a>

</div>

{% endblock %}
