{% extends 'base.html' %}
{% block content %}

<style>
/* reuse same style from edit page */
body {
    background: linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family: 'Poppins', sans-serif;
}

.wrapper {
    max-width: 420px;
    margin: auto;
    padding: 16px;
}

.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    padding: 16px;
}

.input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(to right,#7c3aed,#a78bfa);
    color: white;
    font-weight: 600;
}
</style>

<div class="wrapper">

    <h2>Add User ➕</h2>

    <div class="card">

        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" class="input">

            <label>Email</label>
            <input type="email" name="email" class="input">

            <label>Password</label>
            <input type="password" name="password" class="input">

            <label>
                <input type="checkbox" name="is_staff"> Admin Access
            </label>

            <br><br>

            <button type="submit" class="btn">
                Create User
            </button>

        </form>

    </div>

</div>

{% endblock %}
