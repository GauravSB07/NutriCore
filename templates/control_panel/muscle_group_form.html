{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>

/* REMOVE NAV */
nav, .navbar, .bottom-nav, .top-nav, header{
    display:none !important;
}

body{
    margin:0;
    background:linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family:'Poppins',sans-serif;
}

/* WRAPPER */
.wrapper{
    max-width:420px;
    margin:auto;
    padding:18px;
}

/* BACK */
.back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;

    padding:6px 10px;
    margin-bottom:12px;

    border-radius:10px;

    background:rgba(255,255,255,0.6);
    border:1px solid rgba(124,58,237,0.2);

    font-size:12px;
    font-weight:600;
    color:#6b7280;
    text-decoration:none;

    transition:0.2s;
}

.back-btn:hover{
    background:#ede9fe;
    color:#7c3aed;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:800;
    margin-bottom:14px;
    color:#111827;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.82);
    backdrop-filter:blur(18px);

    border-radius:24px;
    padding:18px;

    border:1px solid rgba(124,58,237,0.1);

    box-shadow:
        0 10px 25px rgba(124,58,237,0.12);
}

/* LABEL */
label{
    font-size:12px;
    font-weight:600;
    color:#4b5563;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:14px;

    border-radius:14px;
    border:1px solid rgba(124,58,237,0.18);

    background:rgba(255,255,255,0.8);

    font-size:13px;
    font-family:'Poppins',sans-serif;

    outline:none;
    box-sizing:border-box;

    transition:0.2s;
}

input:focus{
    border-color:#7c3aed;

    box-shadow:
        0 0 0 3px rgba(124,58,237,0.15);
}

/* FILE */
input[type="file"]{
    background:#faf5ff;
    padding:10px;
}

/* PREVIEW */
.preview{
    margin-top:10px;
    margin-bottom:14px;
}

.preview img{
    width:100px;
    height:100px;

    object-fit:cover;

    border-radius:18px;

    border:2px solid rgba(124,58,237,0.12);

    box-shadow:
        0 8px 18px rgba(124,58,237,0.12);
}

/* BUTTON */
.btn{
    width:100%;
    padding:13px;

    border:none;
    border-radius:16px;

    background:linear-gradient(to right,#7c3aed,#a78bfa);

    color:white;
    font-size:14px;
    font-weight:700;

    cursor:pointer;

    transition:0.2s;

    box-shadow:
        0 8px 20px rgba(124,58,237,0.25);
}

.btn:hover{
    transform:translateY(-1px);
}

/* ERROR */
.error-box{
    background:#fee2e2;
    color:#dc2626;

    padding:10px;
    border-radius:12px;

    font-size:12px;
    margin-bottom:12px;
}

</style>


<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        Add / Edit Muscle Group 💪
            <!-- BACK -->
        <a href="{% url 'muscle_group_list' %}" class="back-btn">
            ← Muscle Groups
        </a>

    </div>


    <!-- CARD -->
    <div class="card">

        {% if form.errors %}
        <div class="error-box">
            {{ form.errors }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- NAME -->
            <label>Muscle Group Name</label>
            {{ form.name }}

            <!-- IMAGE -->
            <label>Muscle Group Image</label>

            {% if form.instance.image %}
            <div class="preview">
                <img src="{{ form.instance.image.url }}">
            </div>
            {% endif %}

            {{ form.image }}

            <!-- BUTTON -->
            <button type="submit" class="btn">
                Save Muscle Group
            </button>

        </form>

    </div>

</div>

{% endblock %}
