{% extends 'base.html' %}
{% block content %}

<style>

/* REMOVE NAV */
nav, .navbar, .bottom-nav, .top-nav, header{
    display:none !important;
}

body{
    margin:0;
    background:linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family:'Poppins',sans-serif;
}

/* WRAPPER */
.wrapper{
    max-width:420px;
    margin:auto;
    padding:16px;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:800;
    margin-bottom:6px;
    color:#111827;
}

.sub-header{
    font-size:13px;
    color:#6b7280;
    margin-bottom:14px;
}

/* TOP BAR */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

/* ADD BUTTON */
.add-btn{
    padding:10px 14px;
    border-radius:12px;

    background:linear-gradient(to right,#7c3aed,#a78bfa);

    color:white;
    text-decoration:none;

    font-size:13px;
    font-weight:600;

    transition:0.2s;

    box-shadow:
        0 8px 20px rgba(124,58,237,0.2);
}

.add-btn:hover{
    transform:translateY(-1px);
}

/* SEARCH */
.search-wrap{
    position:relative;
    margin-bottom:14px;
}

.search{
    width:100%;
    padding:12px 14px 12px 42px;

    border:none;
    outline:none;

    border-radius:16px;

    background:rgba(255,255,255,0.75);

    font-size:13px;

    box-sizing:border-box;

    border:1px solid rgba(124,58,237,0.1);

    box-shadow:
        0 8px 20px rgba(124,58,237,0.08);
}

.search:focus{
    border-color:#7c3aed;
}

.search-icon{
    position:absolute;

    left:14px;
    top:50%;

    transform:translateY(-50%);

    color:#7c3aed;
    font-size:14px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(18px);

    border-radius:24px;
    padding:14px;

    border:1px solid rgba(124,58,237,0.1);

    box-shadow:
        0 10px 25px rgba(124,58,237,0.12);

    transition:0.2s;
}

/* EXERCISE ITEM */
.exercise-item{
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;

    background:rgba(255,255,255,0.65);

    border:1px solid rgba(124,58,237,0.1);

    transition:0.2s;
}

.exercise-item:hover{
    background:#ede9fe;
    transform:translateY(-2px);
}

/* TOP */
.exercise-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* NAME */
.exercise-name{
    font-size:15px;
    font-weight:700;
    color:#111827;
}

/* SUB MUSCLE */
.sub-muscle{
    margin-top:8px;

    display:inline-flex;
    align-items:center;
    gap:5px;

    background:#f5f3ff;
    color:#7c3aed;

    padding:6px 10px;
    border-radius:12px;

    font-size:11px;
    font-weight:600;
}

/* ACTIONS */
.actions{
    display:flex;
    gap:14px;

    margin-top:12px;

    font-size:12px;
}

.actions a{
    text-decoration:none;
    font-weight:600;
}

.edit{
    color:#7c3aed;
}

.delete{
    color:#dc2626;
}

/* EMPTY */
.empty{
    color:#6b7280;
    text-align:center;
    padding:12px;
    font-size:13px;
}

</style>


<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        Exercises 🏋️
    </div>

    <div class="sub-header" id="exerciseCount">
        Total Exercises: {{ exercises|length }}
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">

        <a href="{% url 'add_exercise' %}" class="add-btn">
            + Add Exercise
        </a>

    </div>

    <!-- SEARCH -->
    <div class="search-wrap">

        <span class="search-icon">🔍</span>

        <input type="text"
               id="searchInput"
               class="search"
               placeholder="Search exercises...">

    </div>

    <!-- LIST -->
    <div class="card" id="exerciseContainer">

        {% include 'control_panel/partials/exercise_items.html' %}

    </div>

</div>


<script>

const searchInput = document.getElementById('searchInput');
const exerciseContainer = document.getElementById('exerciseContainer');
const exerciseCount = document.getElementById('exerciseCount');

let timeout = null;

searchInput.addEventListener('input', function(){

    clearTimeout(timeout);

    timeout = setTimeout(() => {

        exerciseContainer.style.opacity = "0.5";

        fetch(`?q=${this.value}`,{
            headers:{
                'X-Requested-With':'XMLHttpRequest'
            }
        })

        .then(res => res.json())

        .then(data => {

            exerciseContainer.innerHTML = data.html;

            exerciseCount.innerHTML =
                `Total Exercises: ${data.count}`;

            exerciseContainer.style.opacity = "1";

        });

    },300);

});

</script>

{% endblock %}
