{% extends 'base.html' %}
{% block content %}

<style>

/* REMOVE NAV */
nav, .navbar, .bottom-nav, .top-nav, header{
    display:none !important;
}

body{
    margin:0;
    background:linear-gradient(135deg,#e9d5ff,#c084fc);
    font-family:'Poppins',sans-serif;
}

/* WRAPPER */
.wrapper{
    max-width:420px;
    margin:auto;
    padding:16px;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:800;
    margin-bottom:6px;
    color:#111827;
}

.sub-header{
    font-size:13px;
    color:#6b7280;
    margin-bottom:14px;
}

/* TOP BAR */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

/* ADD BUTTON */
.add-btn{
    padding:10px 14px;
    border-radius:12px;

    background:linear-gradient(to right,#7c3aed,#a78bfa);

    color:white;
    text-decoration:none;

    font-size:13px;
    font-weight:600;

    transition:0.2s;

    box-shadow:
        0 8px 20px rgba(124,58,237,0.2);
}

.add-btn:hover{
    transform:translateY(-1px);
}

/* CARD */
.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(18px);

    border-radius:24px;
    padding:14px;

    border:1px solid rgba(124,58,237,0.1);

    box-shadow:
        0 10px 25px rgba(124,58,237,0.12);
}

/* GROUP ITEM */
.group-item{
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;

    background:rgba(255,255,255,0.65);

    border:1px solid rgba(124,58,237,0.1);

    transition:0.2s;
}

.group-item:hover{
    background:#ede9fe;
    transform:translateY(-2px);
}

/* TOP */
.group-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* NAME */
.group-name{
    font-size:15px;
    font-weight:700;
    color:#111827;
}

/* ICON BADGE */
/* IMAGE BADGE */
.group-badge{
    width:48px;
    height:48px;

    border-radius:14px;

    overflow:hidden;

    background:#f5f3ff;

    display:flex;
    align-items:center;
    justify-content:center;

    border:2px solid rgba(124,58,237,0.12);

    box-shadow:
        0 6px 14px rgba(124,58,237,0.12);
}

/* IMAGE */
.group-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* EMPTY */
.empty{
    color:#6b7280;
    text-align:center;
    padding:12px;
    font-size:13px;
}

</style>


<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        Muscle Groups 💪
    </div>

    <div class="sub-header">
        Total Groups: {{ groups|length }}
        &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;
        <a href="{% url 'admin_dashboard' %}" class="back">
        ← Back
        </a>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">

        <a href="{% url 'add_muscle_group' %}" class="add-btn">
            + Add Group
        </a>

    </div>

    <!-- LIST -->
    <div class="card">

        {% for g in groups %}

        <div class="group-item">

            <div class="group-top">

                <div class="group-name">
                    {{ g.name }}
                </div>

            <div class="group-badge">

                {% if g.image %}
                    <img src="{{ g.image.url }}" class="group-img">
                {% else %}
                    💪
                {% endif %}

            </div>

            </div>

        </div>

        {% empty %}

        <div class="empty">
            No muscle groups found 💪
        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
